apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: devops-evaluation-ingress

spec:
  ingressClassName: nginx

  rules:
  - host: devops.host
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: devops-evaluation-service
            port:
              number: 80